name: Publicar documentação viva (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'tools/docs-site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para o hash de origem e o git diff do mecanismo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gerar o site (docs/site/)
        run: npm run docs:build

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # tenta habilitar o Pages automaticamente (requer Source = GitHub Actions)

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
